name: Scheduled Cron Jobs

on:
  schedule:
    # 21:05 UTC — ES/NQ 收盤後結算（台灣 05:05）
    - cron: '5 21 * * 1-5'
    # 00:05 UTC — 加密貨幣收盤後結算 + 建立新市場（台灣 08:05）
    - cron: '5 0 * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  settle-markets:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger settle-markets
        run: |
          curl -s -X POST \
            "https://futuremarket-production.up.railway.app/api/cron/settle-markets" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60
          echo ""
          echo "Settlement triggered at $(date -u)"

  create-markets:
    runs-on: ubuntu-latest
    # 只在 00:05 UTC 時建立新市場
    if: github.event.schedule == '5 0 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger create-markets
        run: |
          curl -s -X POST \
            "https://futuremarket-production.up.railway.app/api/cron/create-markets" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60
          echo ""
          echo "Market creation triggered at $(date -u)"

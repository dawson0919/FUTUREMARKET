<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d5dfc"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Upward trending chart line -->
  <path d="M100 380 L200 300 L280 340 L400 160" stroke="url(#arrow)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow head -->
  <path d="M370 148 L412 152 L408 194" stroke="url(#arrow)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- FM text -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="100" font-weight="900" fill="white" letter-spacing="-2">FM</text>
</svg>
